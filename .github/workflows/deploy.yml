name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:       # manual trigger for demo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'ODL-GHAZ-2177134' }}
  FUNCTIONS_APP_NAME: ${{ vars.FUNCTIONS_APP_NAME || 'func-sentinel-intel-dev' }}
  STATIC_WEB_APP_NAME: ${{ vars.STATIC_WEB_APP_NAME || 'swa-sentinel-intel-dev' }}

jobs:
  # ── 1. Provision infrastructure via Bicep ───────────────────────────
  infra:
    name: Deploy Infrastructure (Bicep)
    runs-on: ubuntu-latest
    outputs:
      functionsAppName: ${{ steps.bicep.outputs.functionsAppName }}
      staticWebAppUrl: ${{ steps.bicep.outputs.staticWebAppUrl }}
      functionsExists: ${{ steps.check.outputs.functionsExists }}
      resolvedAppName: ${{ steps.check.outputs.resolvedAppName }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Bicep CLI
        run: az bicep install

      - name: Validate Bicep (what-if on PR)
        if: github.event_name == 'pull_request'
        run: |
          az deployment group what-if \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam

      - name: Deploy Bicep
        id: bicep
        run: |
          RESULT=$(az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --output json 2>&1) || { echo "Bicep deploy output: $RESULT"; exit 1; }
          echo "functionsAppName=$(echo $RESULT | jq -r '.properties.outputs.functionsAppName.value // empty')" >> "$GITHUB_OUTPUT"
          echo "staticWebAppUrl=$(echo $RESULT | jq -r '.properties.outputs.staticWebAppUrl.value // empty')" >> "$GITHUB_OUTPUT"

      - name: Check if Functions app exists
        id: check
        run: |
          APP_NAME="${{ steps.bicep.outputs.functionsAppName }}"
          if [ -z "$APP_NAME" ]; then
            APP_NAME="${FUNCTIONS_APP_NAME}"
          fi

          EXISTS=$(az functionapp show \
            --name "$APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query name -o tsv 2>/dev/null || echo "")

          if [ -z "$EXISTS" ]; then
            EXISTS=$(az functionapp list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --query "[?starts_with(name,'${FUNCTIONS_APP_NAME}')].name | [0]" \
              -o tsv 2>/dev/null || echo "")
          fi

          if [ -n "$EXISTS" ]; then
            echo "functionsExists=true" >> "$GITHUB_OUTPUT"
            echo "resolvedAppName=$EXISTS" >> "$GITHUB_OUTPUT"
            echo "Azure Functions app '$EXISTS' found — will deploy backend"
          else
            echo "functionsExists=false" >> "$GITHUB_OUTPUT"
            echo "resolvedAppName=" >> "$GITHUB_OUTPUT"
            echo "Azure Functions app not provisioned yet — skipping backend deploy"
          fi

  # ── 2. Deploy Azure Functions (Python backend) ──────────────────────
  backend:
    name: Deploy Backend (Azure Functions)
    runs-on: ubuntu-latest
    needs: infra
    if: needs.infra.outputs.functionsExists == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ needs.infra.outputs.resolvedAppName || env.FUNCTIONS_APP_NAME }}
          package: backend/
          scm-do-build-during-deployment: true

  # ── 3. Redeploy Foundry AI agents (prompts, tools, settings) ───────
  agents:
    name: Deploy Foundry Agents
    runs-on: ubuntu-latest
    needs: infra
    # Always runs — create_agents.py --update is idempotent (just API calls)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agents/requirements.txt

      - name: Install agent dependencies
        run: pip install -r agents/requirements.txt

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Discover Azure resource endpoints
        id: discover
        run: |
          RG="${AZURE_RESOURCE_GROUP}"
          SUB_ID=$(az account show --query id -o tsv)

          # Foundry AI project — find by naming convention
          AI_PROJECT=$(az resource list -g "$RG" \
            --resource-type "Microsoft.MachineLearningServices/workspaces" \
            --query "[?starts_with(name,'aip-')].name | [0]" -o tsv 2>/dev/null || echo "")
          if [ -z "$AI_PROJECT" ]; then
            echo "::error::No AI Foundry project found in $RG"
            exit 1
          fi
          # Construct semicolon-delimited connection string
          ENDPOINT="swedencentral.api.azureml.ms;${SUB_ID};${RG};${AI_PROJECT}"
          echo "FOUNDRY_ENDPOINT=${ENDPOINT}" >> "$GITHUB_OUTPUT"
          echo "  AI Project: $AI_PROJECT"

          # MCP Container App FQDNs
          for APP_PAIR in "mcp-db:MCP_SENTINEL_DB_URL" "mcp-search:MCP_SENTINEL_SEARCH_URL" "mcp-qms:MCP_QMS_URL" "mcp-cmms:MCP_CMMS_URL"; do
            PREFIX="${APP_PAIR%%:*}"
            VAR_NAME="${APP_PAIR##*:}"
            FQDN=$(az containerapp list -g "$RG" \
              --query "[?starts_with(name,'${PREFIX}')].properties.configuration.ingress.fqdn | [0]" -o tsv 2>/dev/null || echo "")
            if [ -n "$FQDN" ]; then
              echo "${VAR_NAME}=https://${FQDN}/mcp" >> "$GITHUB_OUTPUT"
              echo "  ${PREFIX}: https://${FQDN}/mcp"
            else
              echo "::warning::Container App ${PREFIX}-* not found in $RG"
            fi
          done

      - name: Deploy Foundry Agents (create/update)
        env:
          AZURE_AI_FOUNDRY_AGENTS_ENDPOINT: ${{ steps.discover.outputs.FOUNDRY_ENDPOINT }}
          AZURE_AI_AGENTS_TESTS_IS_TEST_RUN: "True"
          MCP_SENTINEL_DB_URL: ${{ steps.discover.outputs.MCP_SENTINEL_DB_URL }}
          MCP_SENTINEL_SEARCH_URL: ${{ steps.discover.outputs.MCP_SENTINEL_SEARCH_URL }}
          MCP_QMS_URL: ${{ steps.discover.outputs.MCP_QMS_URL }}
          MCP_CMMS_URL: ${{ steps.discover.outputs.MCP_CMMS_URL }}
        run: python agents/create_agents.py --update

  # ── 4. Deploy React frontend (Azure Static Web Apps) ────────────────
  frontend:
    name: Deploy Frontend (Static Web App)
    runs-on: ubuntu-latest
    needs: infra

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'frontend'
          output_location: 'dist'
        env:
          VITE_ENTRA_TENANT_ID: ${{ secrets.VITE_ENTRA_TENANT_ID }}
          VITE_ENTRA_SPA_CLIENT_ID: ${{ secrets.VITE_ENTRA_SPA_CLIENT_ID }}
          VITE_ENTRA_API_CLIENT_ID: ${{ secrets.VITE_ENTRA_API_CLIENT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
