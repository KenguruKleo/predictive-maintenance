name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:       # manual trigger for demo

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  FUNCTIONS_APP_NAME: ${{ vars.FUNCTIONS_APP_NAME }}
  STATIC_WEB_APP_NAME: ${{ vars.STATIC_WEB_APP_NAME }}

jobs:
  # ── 1. Provision infrastructure via Bicep ───────────────────────────
  infra:
    name: Deploy Infrastructure (Bicep)
    runs-on: ubuntu-latest
    outputs:
      functionsAppName: ${{ steps.bicep.outputs.functionsAppName }}
      staticWebAppUrl: ${{ steps.bicep.outputs.staticWebAppUrl }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Bicep CLI
        run: az bicep install

      - name: Validate Bicep (what-if on PR)
        if: github.event_name == 'pull_request'
        run: |
          az deployment group what-if \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam

      - name: Deploy Bicep
        id: bicep
        run: |
          RESULT=$(az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --output json)
          echo "functionsAppName=$(echo $RESULT | jq -r '.properties.outputs.functionsAppName.value')" >> "$GITHUB_OUTPUT"
          echo "staticWebAppUrl=$(echo $RESULT | jq -r '.properties.outputs.staticWebAppUrl.value')" >> "$GITHUB_OUTPUT"

  # ── 2. Deploy Azure Functions (Python backend) ──────────────────────
  backend:
    name: Deploy Backend (Azure Functions)
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTIONS_APP_NAME }}
          package: backend/
          scm-do-build-during-deployment: true

  # ── 3. Deploy React frontend (Azure Static Web Apps) ────────────────
  # TODO (T-032): uncomment when frontend/ is scaffolded
