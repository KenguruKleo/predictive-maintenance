name: Electron macOS Build

on:
  push:
    tags: ['release-*']

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  frontend-tests:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm run test:unit

  macos:
    name: Build macOS desktop app
    runs-on: macos-latest
    needs: frontend-tests
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate release version
        working-directory: .
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#release-}"
          frontend_version=$(node -p "require('./frontend/package.json').version")
          teams_version=$(node -p "require('./teamsapp/manifest.json').version")
          if [ "$frontend_version" != "$version" ]; then
            echo "frontend/package.json version ($frontend_version) does not match tag version ($version)"
            exit 1
          fi
          if [ "$teams_version" != "$version" ]; then
            echo "teamsapp/manifest.json version ($teams_version) does not match tag version ($version)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build macOS desktop artifacts
        run: npm run electron:dist:mac
        env:
          VITE_ENTRA_TENANT_ID: ${{ secrets.VITE_ENTRA_TENANT_ID }}
          VITE_ENTRA_SPA_CLIENT_ID: ${{ secrets.VITE_ENTRA_SPA_CLIENT_ID }}
          VITE_ENTRA_API_CLIENT_ID: ${{ secrets.VITE_ENTRA_API_CLIENT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: List desktop artifacts
        run: ls -lh release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-intelligence-macos-${{ github.sha }}
          path: |
            frontend/release/*.dmg
            frontend/release/*.zip
            frontend/release/*.blockmap
          if-no-files-found: error
          retention-days: 14

      - name: Publish assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/release-')
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "Sentinel Intelligence release artifacts." \
              || gh release view "$tag" >/dev/null 2>&1
          fi
          shopt -s nullglob
          files=(frontend/release/*.dmg frontend/release/*.zip frontend/release/*.blockmap)
          gh release upload "$tag" "${files[@]}" --clobber
