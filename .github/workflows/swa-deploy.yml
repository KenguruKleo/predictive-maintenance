name: Deploy Frontend to Azure Static Web Apps

# Deploys to: https://calm-flower-0a6d7f90f.7.azurestaticapps.net
# Azure resource: swa-sentinel-intel-dev (ODL-GHAZ-2177134)
# Required GitHub secret: SWA_DEPLOYMENT_TOKEN
#   Get it with: az staticwebapp secrets list --name swa-sentinel-intel-dev \
#                  --resource-group ODL-GHAZ-2177134 --query "properties.apiKey" -o tsv

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/swa-deploy.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build_and_deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'frontend'
          output_location: 'dist'
        env:
          VITE_ENTRA_TENANT_ID: ${{ secrets.VITE_ENTRA_TENANT_ID }}
          VITE_ENTRA_SPA_CLIENT_ID: ${{ secrets.VITE_ENTRA_SPA_CLIENT_ID }}
          VITE_ENTRA_API_CLIENT_ID: ${{ secrets.VITE_ENTRA_API_CLIENT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

  close_pull_request:
    name: Close PR Staging Environment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'

    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: 'close'
