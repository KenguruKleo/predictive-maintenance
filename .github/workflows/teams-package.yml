name: Teams App Package

on:
  push:
    tags: ['release-*']

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend-tests:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm run test:unit

  teams-package:
    name: Build Teams app package
    runs-on: macos-latest
    needs: frontend-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate release version
        id: release_version
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#release-}"
          frontend_version=$(node -p "require('./frontend/package.json').version")
          teams_version=$(node -p "require('./teamsapp/manifest.json').version")
          if [ "$frontend_version" != "$version" ]; then
            echo "frontend/package.json version ($frontend_version) does not match tag version ($version)"
            exit 1
          fi
          if [ "$teams_version" != "$version" ]; then
            echo "teamsapp/manifest.json version ($teams_version) does not match tag version ($version)"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Generate Teams app icons
        run: node teamsapp/scripts/generate-icons.mjs

      - name: Verify Teams package inputs
        run: |
          set -euo pipefail
          cd teamsapp
          for file in manifest.json color.png outline.png; do
            if [ ! -f "$file" ]; then
              echo "Missing Teams package input: $file"
              exit 1
            fi
          done

      - name: Build Teams app package
        run: |
          set -euo pipefail
          mkdir -p teamsapp/dist
          cd teamsapp
          zip -j "dist/sentinel-intelligence-teams-${{ steps.release_version.outputs.version }}.zip" manifest.json color.png outline.png

      - name: List Teams app artifact
        run: ls -lh teamsapp/dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-intelligence-teams-${{ github.sha }}
          path: teamsapp/dist/sentinel-intelligence-teams-${{ steps.release_version.outputs.version }}.zip
          if-no-files-found: error
          retention-days: 14

      - name: Publish asset to GitHub Release
        if: startsWith(github.ref, 'refs/tags/release-')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "Sentinel Intelligence release artifacts." \
              || gh release view "$tag" >/dev/null 2>&1
          fi
          gh release upload "$tag" teamsapp/dist/sentinel-intelligence-teams-${{ steps.release_version.outputs.version }}.zip --clobber