<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="bg" x1="160" y1="60" x2="1760" y2="1020" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f5f7"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1510 170) rotate(144) scale(560 340)">
      <stop stop-color="#deebff"/>
      <stop offset="1" stop-color="#deebff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 980) rotate(9) scale(520 260)">
      <stop stop-color="#e3fcef"/>
      <stop offset="1" stop-color="#e3fcef" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="0" y="0" width="1920" height="1080" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#172b4d" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#blueGlow)"/>
  <rect width="1920" height="1080" fill="url(#mintGlow)"/>
  <rect x="0" y="0" width="1920" height="96" fill="#172b4d"/>

  <text x="128" y="61" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Sentinel Intelligence</text>
  <text x="1788" y="61" text-anchor="end" fill="#b3bac5" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">RBAC enforced with Entra app roles and token validation</text>

  <text x="128" y="206" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" letter-spacing="6">ROLE-BASED ACCESS CONTROL</text>
  <text x="128" y="292" fill="#172b4d" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800">Each role sees only relevant data.</text>
  <text x="128" y="352" fill="#344563" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="500">Operators, QA, maintenance, audit, and IT each work inside a governed access lane.</text>

  <g>
    <rect x="128" y="392" width="166" height="44" rx="22" fill="#deebff"/>
    <text x="211" y="420" text-anchor="middle" fill="#0052cc" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">5 APP ROLES</text>

    <rect x="314" y="392" width="244" height="44" rx="22" fill="#e3fcef"/>
    <text x="436" y="420" text-anchor="middle" fill="#006644" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">RELEVANT DATA ONLY</text>

    <rect x="578" y="392" width="216" height="44" rx="22" fill="#fffae6"/>
    <text x="686" y="420" text-anchor="middle" fill="#ca7d01" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">UI + API ENFORCED</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="1308" y="146" width="484" height="286" rx="34" fill="#ffffff"/>
  </g>
  <rect x="1308" y="146" width="484" height="286" rx="34" fill="#ffffff" stroke="#dfe1e6" stroke-width="2"/>
  <rect x="1350" y="186" width="76" height="76" rx="22" fill="#deebff"/>
  <path d="M1388 200L1410 212V236C1410 249 1400 259 1388 264C1376 259 1366 249 1366 236V212L1388 200Z" fill="#0052cc"/>
  <path d="M1380 230L1386 236L1397 224" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1458" y="214" fill="#172b4d" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">Governed by design</text>
  <text x="1458" y="250" fill="#344563" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400">Microsoft Entra app roles define</text>
  <text x="1458" y="276" fill="#344563" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400">which incidents, telemetry,</text>
  <text x="1458" y="302" fill="#344563" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400">templates, and approvals</text>
  <text x="1458" y="328" fill="#344563" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400">each role can see.</text>
  <text x="1458" y="366" fill="#0052cc" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Frontend and backend</text>
  <text x="1458" y="392" fill="#0052cc" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">enforce the same</text>
  <text x="1458" y="418" fill="#0052cc" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">role claim.</text>

  <g filter="url(#cardShadow)">
    <rect x="128" y="470" width="1664" height="516" rx="34" fill="#ffffff"/>
  </g>
  <rect x="128" y="470" width="1664" height="516" rx="34" fill="#ffffff" stroke="#dfe1e6" stroke-width="2"/>
  <rect x="128" y="470" width="1664" height="74" rx="34" fill="#f4f5f7"/>
  <text x="182" y="516" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" letter-spacing="2">ROLE</text>
  <text x="500" y="516" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" letter-spacing="2">RELEVANT INFORMATION</text>

  <g>
    <rect x="160" y="566" width="1600" height="68" rx="22" fill="#fbfcfe"/>
    <rect x="184" y="584" width="172" height="34" rx="17" fill="#deebff"/>
    <text x="270" y="607" text-anchor="middle" fill="#0052cc" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">OPERATOR</text>
    <text x="500" y="594" fill="#172b4d" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Assigned incidents, evidence package, editable CAPA drafts</text>
    <text x="500" y="620" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400">Approve, reject, or request more information before execution.</text>
  </g>

  <g>
    <rect x="160" y="650" width="1600" height="68" rx="22" fill="#fbfcfe"/>
    <rect x="184" y="668" width="194" height="34" rx="17" fill="#fffae6"/>
    <text x="281" y="691" text-anchor="middle" fill="#ca7d01" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">QA MANAGER</text>
    <text x="500" y="678" fill="#172b4d" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">All incidents, escalation queue, agreement KPIs, incident telemetry</text>
    <text x="500" y="704" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400">Can make the decision when a case escalates beyond operator scope.</text>
  </g>

  <g>
    <rect x="160" y="734" width="1600" height="68" rx="22" fill="#fbfcfe"/>
    <rect x="184" y="752" width="226" height="34" rx="17" fill="#e3fcef"/>
    <text x="297" y="775" text-anchor="middle" fill="#006644" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">MAINTENANCE TECH</text>
    <text x="500" y="762" fill="#172b4d" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Approved, executed, and closed incidents plus work-order follow-up context</text>
    <text x="500" y="788" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400">Sees downstream execution status without changing the governed decision record.</text>
  </g>

  <g>
    <rect x="160" y="818" width="1600" height="68" rx="22" fill="#fbfcfe"/>
    <rect x="184" y="836" width="160" height="34" rx="17" fill="#f4f5f7"/>
    <text x="264" y="859" text-anchor="middle" fill="#42526e" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">AUDITOR</text>
    <text x="500" y="846" fill="#172b4d" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">History and audit trail, AI-vs-human outcome, prompt trace visibility</text>
    <text x="500" y="872" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400">Can inspect what happened, why it happened, and which evidence supported it.</text>
  </g>

  <g>
    <rect x="160" y="902" width="1600" height="68" rx="22" fill="#fbfcfe"/>
    <rect x="184" y="920" width="168" height="34" rx="17" fill="#dfe1e6"/>
    <text x="268" y="943" text-anchor="middle" fill="#172b4d" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">IT ADMIN</text>
    <text x="500" y="930" fill="#172b4d" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">All incidents, analytics, telemetry, and document templates</text>
    <text x="500" y="956" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400">Template maintenance stays under IT control while operational telemetry stays observable.</text>
  </g>

  <text x="128" y="1030" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500">Each role is limited to the information needed for its responsibility, while governed actions stay with the right reviewer.</text>
</svg>