<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1800" y2="1040" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f5f7"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1520 180) rotate(145) scale(620 380)">
      <stop stop-color="#deebff"/>
      <stop offset="1" stop-color="#deebff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 980) rotate(10) scale(560 320)">
      <stop stop-color="#e3fcef"/>
      <stop offset="1" stop-color="#e3fcef" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="0" y="0" width="1920" height="1080" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#172b4d" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#blueGlow)"/>
  <rect width="1920" height="1080" fill="url(#mintGlow)"/>
  <rect x="0" y="0" width="1920" height="96" fill="#172b4d"/>

  <text x="128" y="61" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Sentinel Intelligence</text>
  <text x="1788" y="61" text-anchor="end" fill="#b3bac5" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Impact summary · 06:30–06:50</text>

  <text x="128" y="156" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="5">IMPACT + GOVERNANCE</text>
  <text x="128" y="210" fill="#172b4d" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="800">Faster decisions, safer execution, clearer accountability.</text>
  <text x="128" y="260" fill="#344563" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="500">The product shortens deviation handling while keeping every recommendation visibly governed by confidence state and human approval.</text>

  <g>
    <rect x="128" y="304" width="170" height="42" rx="21" fill="#24292f"/>
    <text x="213" y="331" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">OUTCOME</text>

    <rect x="314" y="304" width="164" height="42" rx="21" fill="#deebff"/>
    <text x="396" y="331" text-anchor="middle" fill="#0052cc" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">GOVERNED AI</text>

    <rect x="494" y="304" width="196" height="42" rx="21" fill="#e3fcef"/>
    <text x="592" y="331" text-anchor="middle" fill="#006644" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">HUMAN APPROVAL</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="56" y="380" width="1232" height="680" rx="36" fill="#ffffff"/>
  </g>
  <rect x="56" y="380" width="1232" height="680" rx="36" fill="#ffffff" stroke="#dfe1e6" stroke-width="2"/>

  <g filter="url(#cardShadow)">
    <rect x="1328" y="380" width="560" height="680" rx="36" fill="#ffffff"/>
  </g>
  <rect x="1328" y="380" width="560" height="680" rx="36" fill="#ffffff" stroke="#dfe1e6" stroke-width="2"/>

  <g>
    <rect x="88" y="414" width="1168" height="264" rx="30" fill="#172b4d"/>
    <rect x="120" y="446" width="182" height="36" rx="18" fill="#deebff"/>
    <text x="211" y="469" text-anchor="middle" fill="#0052cc" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">BEFORE → AFTER</text>
    <text x="332" y="470" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800">Operational impact in one frame</text>
    <text x="332" y="504" fill="#b3bac5" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500">Time drops from manual investigation to a governed decision package with visible next actions.</text>

    <rect x="120" y="548" width="316" height="92" rx="28" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="278" y="579" text-anchor="middle" fill="#b3bac5" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">MANUAL INVESTIGATION</text>
    <text x="278" y="621" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="800">30–60 min</text>

    <rect x="474" y="548" width="396" height="92" rx="28" fill="#4c9aff" fill-opacity="0.18" stroke="#4c9aff" stroke-opacity="0.28"/>
    <text x="672" y="579" text-anchor="middle" fill="#deebff" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">SENTINEL DECISION PACKAGE</text>
    <text x="672" y="621" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="800">&lt; 2 min</text>

    <rect x="908" y="548" width="300" height="92" rx="28" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="1058" y="579" text-anchor="middle" fill="#b3bac5" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">EXECUTION VISIBILITY</text>
    <text x="1058" y="611" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">WO task + audit record</text>
    <text x="1058" y="633" text-anchor="middle" fill="#dfe1e6" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">created immediately after approval</text>
  </g>

  <g>
    <rect x="88" y="706" width="1168" height="320" rx="30" fill="#fbfcfe" stroke="#dfe1e6" stroke-width="2"/>
    <rect x="120" y="740" width="346" height="36" rx="18" fill="#e3fcef"/>
    <text x="293" y="763" text-anchor="middle" fill="#006644" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">THREE-STATE CONFIDENCE GATE</text>
    <text x="120" y="812" fill="#172b4d" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="800">The system shows how certain it is</text>
    <text x="120" y="844" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500">Normal, low confidence, and blocked states keep the UI</text>
    <text x="120" y="869" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500">from presenting an ungrounded answer as final truth.</text>

    <rect x="120" y="888" width="318" height="126" rx="28" fill="#deebff"/>
    <text x="158" y="919" fill="#0052cc" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">NORMAL</text>
    <text x="158" y="950" fill="#172b4d" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800">AI draft is ready</text>
    <text x="158" y="976" fill="#344563" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="500">Evidence, recommendation, and editable</text>
    <text x="158" y="994" fill="#344563" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="500">document drafts are already prepared.</text>

    <rect x="472" y="888" width="318" height="126" rx="28" fill="#fffae6"/>
    <text x="510" y="919" fill="#ca7d01" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">LOW CONFIDENCE</text>
    <text x="510" y="950" fill="#172b4d" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">Human caution is explicit</text>
    <text x="510" y="976" fill="#344563" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="500">Warning banner appears and a comment</text>
    <text x="510" y="994" fill="#344563" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="500">is required before any decision.</text>

    <rect x="824" y="888" width="384" height="126" rx="28" fill="#fde7e9"/>
    <text x="862" y="919" fill="#c9372c" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">BLOCKED</text>
    <text x="862" y="950" fill="#172b4d" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800">No fake certainty</text>
    <text x="862" y="976" fill="#344563" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="500">Recommendation stays empty, required</text>
    <text x="862" y="994" fill="#344563" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="500">fields are manual, and approval stays locked.</text>
  </g>

  <g>
    <text x="1368" y="444" fill="#172b4d" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="800">Why this matters</text>
    <text x="1368" y="482" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="500">This is not only faster than manual GMP triage.</text>
    <text x="1368" y="512" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="500">It stays reviewable, explainable, and governed.</text>

    <circle cx="1400" cy="594" r="24" fill="#deebff"/>
    <text x="1400" y="602" text-anchor="middle" fill="#0052cc" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">1</text>
    <text x="1448" y="582" fill="#172b4d" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">Speed stays usable</text>
    <text x="1448" y="616" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400">Operators get the case summary, evidence,</text>
    <text x="1448" y="644" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400">draft actions, and next steps in minutes.</text>

    <circle cx="1400" cy="748" r="24" fill="#e3fcef"/>
    <text x="1400" y="756" text-anchor="middle" fill="#006644" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">2</text>
    <text x="1448" y="736" fill="#172b4d" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">Governance stays visible</text>
    <text x="1448" y="770" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400">Confidence state is not hidden in telemetry.</text>
    <text x="1448" y="798" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400">It is surfaced directly in the decision workflow.</text>

    <circle cx="1400" cy="902" r="24" fill="#fffae6"/>
    <text x="1400" y="910" text-anchor="middle" fill="#ca7d01" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">3</text>
    <text x="1448" y="890" fill="#172b4d" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">Accountability stays human</text>
    <text x="1448" y="924" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400">The AI prepares the package, but people still</text>
    <text x="1448" y="952" fill="#5e6c84" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400">approve, reject, edit, and own the final record.</text>

    <rect x="1368" y="1010" width="320" height="36" rx="18" fill="#172b4d"/>
    <text x="1528" y="1033" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="800">Fast triage + human control</text>
  </g>
</svg>